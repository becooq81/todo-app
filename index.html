<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div class="app">
        <header class="app-header">
            <h1>📋 나의 할 일</h1>
        </header>

        <section class="progress-section">
            <div class="progress-bar">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
            <p class="progress-text" id="progress-text">0 / 0 완료 (0%)</p>
        </section>

        <section class="input-section">

            <label for="category-select" class="sr-only">카테고리 선택</label>
            <select id="category-select">
                <option value="auto">자동</option>
                <option value="work">업무</option>
                <option value="personal">개인</option>
                <option value="study">공부</option>
            </select>
            <button type="button" id="add-button">추가</button>
            <p class="auto-hint" id="auto-hint" hidden aria-live="polite"></p>
        </section>

        <section class="filter-section">
            <button type="button" class="filter-button active" data-filter="all">전체</button>
            <button type="button" class="filter-button" data-filter="work">업무</button>
            <button type="button" class="filter-button" data-filter="personal">개인</button>
            <button type="button" class="filter-button" data-filter="study">공부</button>
        </section>

        <section class="list-section">
            <ul id="todo-list"></ul>
        </section>
    </div>
