<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 할 일</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>📋 나의 할 일</h1>
            <p class="app-subtitle">오늘 해야 할 일들을 정리해 보세요</p>
        </header>

        <div class="layout">
            <aside class="sidebar">
                <section class="progress-section">
                    <h2 class="section-title">진행률</h2>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                    <p class="progress-text" id="progress-text">0 / 0 완료 (0%)</p>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">전체</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-done">0</span>
                            <span class="stat-label">완료</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-remaining">0</span>
                            <span class="stat-label">남음</span>
                        </div>
                    </div>
                </section>

                <section class="filter-section">
                    <h2 class="section-title">카테고리</h2>
                    <button type="button" class="filter-button active" data-filter="all">
                        <span class="filter-dot dot-all"></span>
                        <span class="filter-name">전체</span>
                        <span class="filter-count" id="count-all">0</span>
                    </button>
                    <button type="button" class="filter-button" data-filter="work">
                        <span class="filter-dot dot-work"></span>
                        <span class="filter-name">업무</span>
                        <span class="filter-count" id="count-work">0</span>
                    </button>
                    <button type="button" class="filter-button" data-filter="personal">
                        <span class="filter-dot dot-personal"></span>
                        <span class="filter-name">개인</span>
                        <span class="filter-count" id="count-personal">0</span>
                    </button>
                    <button type="button" class="filter-button" data-filter="study">
                        <span class="filter-dot dot-study"></span>
                        <span class="filter-name">공부</span>
                        <span class="filter-count" id="count-study">0</span>
                    </button>
                </section>
            </aside>

            <main class="main">
                <section class="input-section">
                    <label for="todo-input" class="sr-only">할 일 입력</label>
                    <input type="text" id="todo-input" placeholder="할 일을 입력하세요. 예: 내일 회의 자료 준비">
                    <label for="category-select" class="sr-only">카테고리 선택</label>
                    <select id="category-select">
                        <option value="auto">자동</option>
                        <option value="work">업무</option>
                        <option value="personal">개인</option>
                        <option value="study">공부</option>
                    </select>
                    <button type="button" id="add-button">추가</button>
                    <p class="auto-hint" id="auto-hint" hidden aria-live="polite"></p>
                </section>

                <section class="list-section">
                    <div class="list-header">
                        <h2 class="list-title" id="list-title">전체 할 일</h2>
                        <span class="list-meta" id="list-meta">0개</span>
                    </div>
                    <ul id="todo-list"></ul>
                </section>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
